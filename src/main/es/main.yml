      - company: Deep Kernel Labs
        position: Software Engineer | Data Engineer
        location: Ourense, Galicia, España
        start_date: 2026-04
        end_date: 2026-06
        summary: >
          Proyecto Applus: Este proyecto consistió en el desarrollo de una plataforma 
          web para la entidad certificadora acreditada Applus. La plataforma permite 
          estandarizar los procesos de inspección, crear nuevos flujos de inspección a 
          partir de la normativa mediante asistencia de IA (inteligencia artificial), interactuar con un 
          chatbot impulsado por IA para responder preguntas sobre los procedimientos 
          de inspección.
        highlights:
          - Contribuí al diseño de la arquitectura de la plataforma, colaborando en la definición de la estructura general del sistema y en la toma de decisiones técnicas.
          - Diseñé e implementé, usando Python, React y desarrollo asistido por IA, una funcionalidad que permite visualizar las fuentes normativas referenciadas en cada paso del proceso de inspección, proporcionando trazabilidad directa entre los procedimientos de inspección y los requisitos regulatorios correspondientes.
          - Extendí, utilizando Python, docling y desarrollo asistido por IA, una biblioteca existente para extraer y convertir secciones de documentos normativos a HTML, permitiendo que los LLMs procesaran la información de forma más eficiente y precisa.
          - "Stack: Python, Django Rest Framework, JSON, SQL, PostgreSQL, pgAdmin, Claude Code (Opus 4.7), Git, Github, React, Docker, docker-compose, docling (Python library), contenedores, Api Rest."
      - company: Datamart
        position: Backend Developer | Cloud Developer
        location: La Habana, Cuba
        start_date: 2025-08
        end_date: 2025-12
        summary: >
          Proyecto Bylaws: Este proyecto consistió en desarrollar un servicio 
          para extraer datos estructurados a partir de contratos de constitución 
          de empresas en formato PDF. El servicio leía los archivos PDF, 
          previamente descargados del RES (Registro de Empresas y Sociedades), 
          extraía el texto del contrato y lo enviaba a un LLM (Large Language 
          Model, inteligencia artificial). Posteriormente, el LLM 
          generaba un objeto JSON con los datos estructurados.
        highlights:
          - Implementé un comparador que utiliza JSONs extraídos manualmente con 
            anterioridad para validar automáticamente la precisión de las 
            respuestas del LLM.
          - Implementé la lógica backend para recibir el RUT de la empresa, 
            buscar su contrato de constitución, enviarlo al LLM y recibir el 
            archivo JSON estructurado como resultado.
          - Validé la funcionalidad de la API REST y el cumplimiento del contrato 
            de la misma utilizando Postman, asegurando que los endpoints 
            cumplieran con las especificaciones esperadas de solicitud/respuesta.
          - "Stack: Amazon Web Services (AWS), Python, BitBucket, Boto3, Postman, AWS Lambda Functions, JSON, AWS S3, Pydantic, SQL, PostgreSQL, pgAdmin."
      - company: Datamart
        position: Backend Developer | Cloud Developer
        location: La Habana, Cuba
        start_date: 2022-06
        end_date: 2025-07
        summary: >
          Proyectos varios Datamart:  Desarrollo de 
          varias plataformas SaaS para clientes del sector financiero. Implementé 
          infraestructura como código utilizando múltiples servicios de AWS, 
          programé la lógica backend 
        highlights:
          - Impementación de (micro)servicios de backend, utilizando Python como
            lenguaje de programación. 


          - Utilicé el modelo de ramificación de Git Flow para obtener una mejor 
            organización en el desarrollo del proyecto.
          - Implementé Event Rules para las step functions, conectando la step 
            function a AWS Event Bridge.
          - Añadí capacidades de logging a las step functions, ayudando a 
            visualizar todo el rastro de ejecución de la step function en AWS 
            CloudWatch.
            - Implementé endpoints que usan código SQL para actualizar, insertar o eliminar datos de la base de datos.
- Transformé el código de AWS Lambda en flujos (pipelines) de AWS AppSync, migrando la lógica del código de Lambdas a endpoints de AppSync. Esto ayudó a eliminar el cold start de las Lambdas y reducir el tiempo de respuesta de 5-6 segundos a 2-3 segundos.
- Diseñé e implementé un esquema GraphQL con más de 20 endpoints que incluyen mutaciones, consultas y suscripciones (comunicación mediante websockets con el frontend) y que fue utilizado por un AWS AppSync para gestionar la mayor parte de la lógica del sistema.
- Añadí AWS CloudWatch Log Groups a todos los microservicios para monitorear el sistema y rastrear los errores.
- Implementé múltiples AWS API Gateway (REST API) con más de 20 endpoints que actúan como proxy hacia un AWS AppSync (GraphQL) (u otros microservicios) y donde el sistema de Rankmi podía comunicarse con el sistema de Datamart.
- Implementé consultas SQL complejas para crear paginación.
- Añadí la funcionalidad para usar una plantilla de correo personalizada, almacenada en AWS S3, en una AWS Lambda que envía OTPs (One-Time Password o contraseñas de un solo uso) al correo de los empleados. Este microservicio era genérico, por lo que permitía la posibilidad de ser utilizado en otros productos.
- Implementé una AWS Step Function para gestionar el flujo de trabajo de múltiples llamadas a API a diferentes microservicios y la manipulación de datos de manera serverless (sin servidor), reduciendo el costo y el tiempo de ejecución del microservicio.
- Implementé múltiples alarmas AWS CloudWatch para Step Functions para habilitar monitoreo proactivo y detección rápida de fallos en los flujos de trabajo.
- Comprobé la correctitud de los datos almacenados en la base de datos usando consultas SQL.
- Validé el flujo de datos consultado la base de datos usando consultas SQL.
- Construí un microservicio seguro, serverless de OTP (One-Time Password o contraseña de un solo uso) utilizando AWS Lambda y DynamoDB con expiración basada en TTL, habilitando la verificación de usuarios mediante correo electrónico.
- Desarrollé más de 10 endpoints en un servidor Django REST API para dar soporte a la funcionalidad central del sistema.
- Implementé múltiples scripts en Python para procesar y manipular archivos JSON de gran tamaño y conjuntos de datos estructurados, dando soporte a la funcionalidad central del sistema.
- Implementé una AWS Step Function para gestionar el flujo de trabajo de múltiples llamadas a API a diferentes microservicios y la manipulación de datos de manera serverless (sin servidor), reduciendo el costo y el tiempo de ejecución del microservicio.

# trabajo de backend con python, varios servicios de aws. microservicios,
# logging y monitoring, api rest y graphql,
# uso de sql para distintas cosas
          - "Stack: Amazon Web Services (AWS), Python, Serverless Framework, BitBucket, GraphQL, Boto3, AWS Appsync, Postman, AWS Lambda Functions, AWS CDK Framework, Typescript, Django Rest Framework, AWS Step Functions, AWS DynamoDB, Xstate.js, Node.js, AWS Apigateway, PostgreSQL, pgAdmin, SQL, Api Rest."
