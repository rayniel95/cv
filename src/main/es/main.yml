  sections:
    Acerca de mí:
      - |
        Ingeniero de Software con casi 5 años de experiencia en el desarrollo 
        de aplicaciones backend y soluciones cloud sobre AWS. He diseñando e 
        implementado arquitecturas 
        escalables y mantenibles utilizando principalmente Python y Node.js 
        (TypeScript). Me 
        adapto con rapidez a nuevas tecnologías y lenguajes. Además de mi 
        experiencia profesional, he desarrollado proyectos personales con Rust, 
        Go, Solidity, React, C#, Prolog y 
        ensamblador x86, lo que me permite abordar los problemas desde una 
        perspectiva amplia y elegir la tecnología más adecuada para cada caso. 
        Disfruto enfrentándome a retos técnicos, aprendiendo continuamente y 
        colaborando en equipos ágiles (Scrum) para construir software de 
        calidad que aporte valor al negocio.

    Experiencia:
      - company: Deep Kernel Labs
        position: Software Engineer | Data Engineer
        location: Ourense, Galicia, España
        start_date: 2026-04
        end_date: 2026-06
        summary: >
          Proyecto Applus: Este proyecto consistió en el desarrollo de una plataforma 
          web para la entidad certificadora acreditada Applus. La plataforma permite 
          estandarizar los procesos de inspección, crear nuevos flujos de inspección a 
          partir de la normativa mediante asistencia de IA (inteligencia artificial), interactuar con un 
          chatbot impulsado por IA para responder preguntas sobre los procedimientos 
          de inspección.
        highlights:
          - Contribuí al diseño de la arquitectura de la plataforma, colaborando en la definición de la estructura general del sistema y en la toma de decisiones técnicas.
          - Diseñé e implementé, usando Python, React y desarrollo asistido por IA, una funcionalidad que permite visualizar las fuentes normativas referenciadas en cada paso del proceso de inspección, proporcionando trazabilidad directa entre los procedimientos de inspección y los requisitos regulatorios correspondientes.
          - Extendí, utilizando Python, docling y desarrollo asistido por IA, una biblioteca existente para extraer y convertir secciones de documentos normativos a HTML, permitiendo que los LLMs procesaran la información de forma más eficiente y precisa.
          - "Stack: Python, Django Rest Framework, JSON, SQL, PostgreSQL, pgAdmin, Claude Code (Opus 4.7), Git, Github, React, Docker, docker-compose, docling (Python library), contenedores, Api Rest."
      - company: Datamart
        position: Backend Developer | Cloud Developer
        location: La Habana, Cuba
        start_date: 2025-08
        end_date: 2025-12
        summary: >
          Proyecto Bylaws: Este proyecto consistió en desarrollar un servicio 
          para extraer datos estructurados a partir de contratos de constitución 
          de empresas en formato PDF. El servicio leía los archivos PDF, 
          previamente descargados del RES (Registro de Empresas y Sociedades), 
          extraía el texto del contrato y lo enviaba a un LLM (Large Language 
          Model, inteligencia artificial). Posteriormente, el LLM 
          generaba un objeto JSON con los datos estructurados.
        highlights:
          - Implementé un comparador que utiliza JSONs extraídos manualmente con 
            anterioridad para validar automáticamente la precisión de las 
            respuestas del LLM.
          - Implementé la lógica backend para recibir el RUT de la empresa, 
            buscar su contrato de constitución, enviarlo al LLM y recibir el 
            archivo JSON estructurado como resultado.
          - Validé la funcionalidad de la API REST y el cumplimiento del contrato 
            de la misma utilizando Postman, asegurando que los endpoints 
            cumplieran con las especificaciones esperadas de solicitud/respuesta.
          - "Stack: Amazon Web Services (AWS), Python, BitBucket, Boto3, Postman, AWS Lambda Functions, JSON, AWS S3, Pydantic, SQL, PostgreSQL, pgAdmin."
      - company: Datamart
        position: Backend Developer | Cloud Developer
        location: La Habana, Cuba
        start_date: 2022-06
        end_date: 2025-07
        summary: >
          Proyectos varios Datamart:  Desarrollo de 
          varias plataformas SaaS para clientes del sector financiero. Implementé 
          infraestructura como código utilizando múltiples servicios de AWS, 
          programé la lógica backend 
        highlights:
          - Desarrollé microservicios backend y APIs escalables con Python, 
            implementando servicios REST (Django REST, API Gateway) y GraphQL 
            (AWS AppSync) con más de 50 endpoints, consultas SQL complejas y 
            procesamiento de grandes volúmenes de datos (JSON) mediante AWS Lambda.
          - Diseñé e implementé arquitecturas serverless sobre AWS utilizando 
            Lambda, Step Functions, AppSync, EventBridge, DynamoDB, S3 y 
            CloudWatch, incorporando flujos de trabajo, autenticación OTP, 
            monitorización, logging y alarmas para mejorar la observabilidad y la 
            resiliencia del sistema.
          - Optimicé el rendimiento y la mantenibilidad de la plataforma, 
            migrando más de 5.000 líneas de código, no documentado, de AWS Lambda a AppSync 
            (reduciendo la latencia de 5–6 s a 2–3 s), documentando 
            la arquitectura a partir de más de 10.000 líneas de código y 
            aplicando buenas prácticas de desarrollo con Git Flow.
          - "Stack: Amazon Web Services (AWS), Python, Serverless Framework, BitBucket, GraphQL, Boto3, AWS Appsync, Postman, AWS Lambda Functions, AWS CDK Framework, Typescript, Django Rest Framework, AWS Step Functions, AWS DynamoDB, Xstate.js, Node.js, AWS Apigateway, PostgreSQL, pgAdmin, SQL, Api Rest."
      - company: Elasbit
        position: Blockchain Developer | Cloud Developer
        location: La Habana, Cuba
        start_date: 2022-01
        end_date: 2022-05
        summary: >
          Proyecto LadyBugs: Elasbit es una empresa chilena que tuvo la idea 
          de crear una colección de NFTs y algunos juegos basados en esta 
          colección.
        highlights:
          - Propuse el uso de técnicas criptográficas (p. ej. salting de 
            contraseñas) para almacenar los datos del usuario en el 
            contrato inteligente mejorando la seguridad.
          - Utilicé funciones AWS Lambda, con Python, para implementar las 
            funcionalidades del backend.
          - "Stack: Solana, Amazon Web Services (AWS), Python, TypeScript, Rust, Anchor Framework, Serverless Framework, XState, React, BitBucket, GraphQL, Boto3, GQL (GraphQL client), AnchorPy, PyTest, Node.js, Mocha, Chai, Solana Web3."
      - company: AgTrace
        position: Backend Developer | Blockchain Developer
        location: La Habana, Cuba
        start_date: 2021-10
        end_date: 2021-11
        summary: >
          Proyecto AgTrace Blockchain: AgTrace es una startup brasileña que 
          propone una 
          solución de trazabilidad basada en blockchain para rastrear todas las 
          etapas de la cadena alimentaria.
        highlights:
          - Creé una red Corda descentralizada utilizando instancias AWS EC2 y 
            Docker.
          - "Stack: Corda, Kotlin, AWS EC2, Amazon Web Services (AWS), Docker, Docker-compose, Thunder Client, Api Rest, Cloud."
