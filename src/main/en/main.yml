  sections:
    About me:
      - |
        Software Engineer with nearly 5 years of experience developing backend 
        applications and cloud solutions on AWS. I have designed and implemented 
        scalable, maintainable architectures using primarily Python and Node.js 
        (TypeScript). I quickly adapt to new technologies and programming languages 
        whenever project requirements demand it. In addition to my professional 
        experience, I have developed personal projects using Rust, Go, Solidity, 
        React, C#, Prolog, and x86 Assembly, which allows me to approach problems 
        from a broad perspective and choose the most appropriate technology for 
        each use case. I enjoy tackling complex technical challenges, continuously 
        learning new technologies, and collaborating in Agile (Scrum) teams to 
        build high-quality software that delivers business value

    Experience:
      - company: Deep Kernel Labs
        position: Software Engineer | Data Engineer
        location: Ourense, Galicia, Spain
        start_date: 2026-04
        end_date: 2026-06
        summary: >
          Project Applus: This project involved developing a web platform for the accredited 
          certification authority, Applus. The platform standardizes inspection processes, enables 
          the creation of new inspection workflows from regulatory standards using AI assistance, 
          allows users to visualize the regulatory sources referenced throughout each inspection 
          process, and provides an AI-powered chatbot to answer questions about inspection procedures.
        highlights:
          - Contributed to the design of the platform's architecture, collaborating on the overall system structure and technical decision-making.
          - Designed and implemented, using Python, React, and AI-assisted development, a feature that enables users to visualize the regulatory norms referenced at each step of an inspection process, providing direct traceability between inspection procedures and their corresponding regulatory requirements.
          - Extended an existing library using Python, Docling, and AI-assisted development to extract and convert sections of regulatory documents into HTML, enabling large language models (LLMs) to process the information more efficiently and accurately.
          - "Stack: Python, Django Rest Framework, JSON, SQL, PostgreSQL, pgAdmin, Claude Code (Opus 4.7), Git, Github, React, Docker, docker-compose, docling (Python library), contenedores."
      - company: Datamart
        position: Backend Developer | Cloud Developer
        location: Havana, Cuba
        start_date: 2025-08
        end_date: 2025-12
        summary: >
          Project Bylaws: This project involved developing a service to extract 
          structured data from company creation contracts in PDF format. The 
          service read the PDFs, previously downloaded from the RES (Registro de Empresas 
          y Sociedades), extracted the contract text, and sent it to an LLM (Large 
          Language Model). Then, the LLM generated a JSON object with the structured 
          data. We used GPT-4o as the LLM for this service. My role involved backend 
          development and verifying the accuracy of the LLM responses.
        highlights:
          - Implemented a comparator that uses previously extracted JSONs manually 
            to automatically check the accuracy of the LLM responses.
          - Implemented the backend logic to receive the company RUT, search for the 
            company creation contract, send it to an LLM, and receive the 
            structured JSON file.
          - Validated REST API functionality and contract compliance using Postman, 
            ensuring endpoints met expected request/response specifications.
          - "Stack: Amazon Web Services (AWS), Python, BitBucket, Boto3, Postman, AWS Lambda Functions, JSON, AWS S3, Pydantic, SQL, PostgreSQL, pgAdmin."
      - company: Datamart
        position: Backend Developer | Cloud Developer
        location: Havana, Cuba
        start_date: 2023-02
        end_date: 2024-06
        summary: >
          Project BCI PymePj: This project is related to create a SaaS platform 
          for chilean bank BCI. The basic idea of this project is to create a 
          SaaS platform that could be used by BCI clients to open pyme (pequeñas 
          y medianas empresas) accounts. The platform allow bank clients to follow 
          a simple guided process from their phones to introduce their data and 
          open the account. By the bank side there is another platform that 
          communicate with the first, it us used to accept the client requests.
        highlights:
          - Developed 10+ endpoints in a Django REST API server to support core 
            system functionality.
          - Built a secure, serverless OTP (One-Time Password) microservice using 
            AWS Lambda and DynamoDB with TTL-based expiration, enabling email-based 
            user verification.
          - Implemented AWS Lambda functions to process and manipulate large JSON 
            payloads and structured datasets, enabling scalable serverless data 
            processing.
          - "Stack: Amazon Web Services (AWS), Python, Serverless Framework, BitBucket, GraphQL, Boto3, AWS Appsync, Postman, AWS Lambda Functions, AWS CDK Framework, Typescript, Django Rest Framework, AWS Step Functions, AWS DynamoDB, Xstate.js, Node.js, AWS Apigateway, PostgreSQL, pgAdmin, SQL."
      - company: Datamart
        position: Backend Developer | Cloud Developer
        location: La Habana, Cuba
        start_date: 2022-08
        end_date: 2023-01
        summary: >
          Proyecto Nómina Avanzada: Este proyecto tuvo como objetivo la creación 
          de una plataforma SaaS que pudiera ser usada por los ejecutivos de 
          Rankmi para crear solicitudes de pago de una parte de la nómina de un 
          trabajador. A traves de una plataforma web, un empleado, podría 
          solicitar a su empleador, un adelanto del sueldo trabajado.
        highlights:
          - Implementé múltiples AWS API Gateway (Rest API), con más de 20 
            endpoints, los cuales actuaban como proxies de un AWS Appsync 
            (GraphQl) u otros microservicios. Permitiendo la comunicación entre 
            los sistemas de Rankmi y Datamart.
          - Implementé consultas SQL complejas para crear paginación.
          - Implementé una AWS Step Function (máquina de estados) para 
            administrar el llamado a apis de múltiples microservicios, además de 
            para la manipulación de datos. Esto en un entorno sin servidor 
            (serverless), reduciendo el costo y tiempo de ejecución del 
            microservicio.
          - "Stack: Amazon Web Services (AWS), Python, Velocity Template Language (VTL), Serverless Framework, GraphQL, Boto3, GQL (GraphQL client), AWS Appsync, Postman, JSON Schema Draft 4, Yaml, AWS Lambda, AWS S3, AWS API Gateway (Rest API), AWS Step Function, Django REST Framework (DRF), AWS Lambda PowerTools, SQL, PostgreSQL, pgAdmin."
    Proyectos personales:
      - name: Raymed
        start_date: 2025-01
        end_date: 2025-02
        summary: >
          Este proyecto es un panel de administración de historiales clínicos. A 
          través del panel, es posible almacenar información sobre pacientes, 
          administradores y médicos, o añadir información sobre exposiciones a 
          fármacos y notas de pacientes. Toda la información se almacena como 
          NFTs (Non-Fungible Tokens o Tokens No Fungibles) en la testnet de 
          Sepolia (Ethereum).
        highlights:
          - Implementé contratos inteligentes de NFTs (ERC-721) para 
            administradores, médicos, pacientes, exposiciones a fármacos y notas, 
            utilizando herencia para mejorar la legibilidad y reutilización del 
            código.
          - "Stack: Typescript, React, Next.js, Node.js, Bootstrap, Alchemy SDK, Hardhat, Hardhat Ignition, React Query, RainbowKit, Pinata, React Admin, Viem, Solidity, HTML, CSS."
